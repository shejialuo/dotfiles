###########################################################
###                Basic  configuration                ####
###########################################################

monitor = DP-1, 3840x2160@144, 0x0, 2

general {
    gaps_in = 8
    gaps_out = 10
    border_size = 0
    layout = dwindle
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true

    mouse_move_enables_dpms = true
    key_press_enables_dpms = true

    enable_swallow = true
    swallow_regex = ^(kitty)$
}

binds {
    workspace_back_and_forth = true
}

group {
    groupbar {
        font_size = 14
    }
}

ecosystem {
    no_donation_nag = true
}

$mod = SUPER
$volume_control = ~/.config/hypr/volume_control.sh

###########################################################
####                     End                           ####
###########################################################



###########################################################
####                   Layouts                         ####
###########################################################

dwindle {
    preserve_split = false
    force_split = 2
}

###########################################################
####                      End                          ####
###########################################################



###########################################################
####                    Effects                        ####
###########################################################

decoration {
    rounding = 0

    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    blur {
        enabled = false
    }

    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 8, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 5, default
}

###########################################################
####                      End                          ####
###########################################################



###########################################################
####                Hyprland operations                ####
###########################################################

# Reload config
bind = $mod shift, c, exec, hyprctl reload

# Exit Hyprland
bind = $mod shift, e, exec, echo -e "Yes\nNo" | rofi -dmenu -p "Exit Hyprland?" | grep -q "Yes" && hyprctl dispatch exit

###########################################################
####                      End                          ####
###########################################################



###########################################################
####               Autostart applications              ####
###########################################################

exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = nm-applet
exec-once = fcitx5
exec-once = easyeffects --service-mode --hide-window
exec-once = hyprpaper
exec-once = hypridle
exec-once = waybar
exec-once = wl-clip-persist --clipboard regular
exec-once = wl-paste --watch cliphist store

###########################################################
####                      End                          ####
###########################################################



###########################################################
####              Start applications                   ####
###########################################################

# launch VSCode
bind = $mod, f1, exec, code

# launch Microsoft Edge
bind = $mod, f2, exec, chromium

# launch file manager
bind = $mod, f3, exec, pcmanfm

# launch spotify
bind = $mod, f4, exec, spotify

# launch kitty terminal
bind = $mod, return, exec, kitty

# launch screenshot
bind = $mod, p, exec, ~/.config/hypr/screenshot.sh

# application launcher
bind = $mod, d, exec, rofi -show drun

# dunst notification controls
bind = $mod, z, exec, dunstctl action
bind = $mod, x, exec, dunstctl context
bind = $mod, i, exec, dunstctl close
bind = $mod shift, i, exec, dunstctl set-paused toggle

# toggle waybar (equivalent to polybar toggle)
bind = $mod, m, exec, pkill -SIGUSR1 waybar

# ssh launcher
bind = $mod shift, s, exec, rofi -show ssh -no-parse-known-hosts

# bluetooth
bind = $mod, b, exec, rofi-bluetooth

# betwork
bind = $mod, n, exec, networkmanager_dmenu

# clipboard
bind = $mod, c, exec, cliphist list | rofi -dmenu -p "Clipboard" -display-columns 2 | cliphist decode | wl-copy

# goldendict
bind = $mod, u, exec, goldendict $(wl-paste -p)

# volume control
bind = , XF86AudioRaiseVolume, exec, $volume_control up
bind = , XF86AudioLowerVolume, exec, $volume_control down
bind = , XF86AudioMute, exec, $volume_control toggle

# lock the session
bind = $mod , w, exec, hyprlock

###########################################################
####                      End                          ####
###########################################################



###########################################################
####                  Change focus                     ####
###########################################################

bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, down,  movefocus, d
bind = $mod, up,    movefocus, u

bind = $mod, h,     movefocus, l
bind = $mod, l,     movefocus, r
bind = $mod, j,     movefocus, d
bind = $mod, k,     movefocus, u

###########################################################
####                       End                         ####
###########################################################



###########################################################
####               Move focused window                 ####
###########################################################

bind = $mod shift, left,      swapwindow, l
bind = $mod shift, right,     swapwindow, r
bind = $mod shift, down,      swapwindow, d
bind = $mod shift, up,        swapwindow, u

bind = $mod shift, h,         swapwindow, l
bind = $mod shift, l,         swapwindow, r
bind = $mod shift, j,         swapwindow, d
bind = $mod shift, k,         swapwindow, u

###########################################################
####                       End                         ####
###########################################################



###########################################################
####                 Window operations                 ####
###########################################################

# kill focused window
bind = $mod, q, killactive

# enter fullscreen mode for the focused container
bind = $mod, f, fullscreen, 0

# toggle tiling / floating
bind = $mod shift, space, togglefloating

# pin a floting window
bind = $mod, t, pin

# layout switching
bind = $mod, e, layoutmsg, togglesplit

# mouse drag for floating/tiling windows
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# scratchpad
bind = $mod shift, A, movetoworkspacesilent, special
bind = $mod, A, togglespecialworkspace

# toggle swallow window
bind = $mod, s, toggleswallow

# resize mode
bind = $mod, r, submap, resize
submap = resize
    binde = , left,      resizeactive, -20 0
    binde = , right,     resizeactive,  20 0
    binde = , up,        resizeactive, 0 -20
    binde = , down,      resizeactive, 0  20
    binde = , h,         resizeactive, -20 0
    binde = , j,         resizeactive, 0  20
    binde = , k,         resizeactive, 0 -20
    binde = , l, resizeactive,  20 0
    bind  = , return, submap, reset
    bind  = , escape, submap, reset
submap = reset

# group operation (not so convient compared with i3)
bind = $mod, g, togglegroup
bind = $mod, bracketleft, changegroupactive, b
bind = $mod, bracketright, changegroupactive, f
bind = $mod shift, g, lockactivegroup, toggle

###########################################################
####                    End                            ####
###########################################################



###########################################################
####               Spotify control                     ####
###########################################################

bind = $mod ctrl, up,    exec, dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.PlayPause
bind = $mod ctrl, left,  exec, dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.Previous
bind = $mod ctrl, right, exec, dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.Next

###########################################################
####                    End                            ####
###########################################################



###########################################################
####              Workspaces operation                 ####
###########################################################

# switch to workspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8

# Move container to workspace (stay on current workspace)
bind = $mod ctrl, 1, movetoworkspacesilent, 1
bind = $mod ctrl, 2, movetoworkspacesilent, 2
bind = $mod ctrl, 3, movetoworkspacesilent, 3
bind = $mod ctrl, 4, movetoworkspacesilent, 4
bind = $mod ctrl, 5, movetoworkspacesilent, 5
bind = $mod ctrl, 6, movetoworkspacesilent, 6
bind = $mod ctrl, 7, movetoworkspacesilent, 7
bind = $mod ctrl, 8, movetoworkspacesilent, 8

# Move container to workspace and follow
bind = $mod shift, 1, movetoworkspace, 1
bind = $mod shift, 2, movetoworkspace, 2
bind = $mod shift, 3, movetoworkspace, 3
bind = $mod shift, 4, movetoworkspace, 4
bind = $mod shift, 5, movetoworkspace, 5
bind = $mod shift, 6, movetoworkspace, 6
bind = $mod shift, 7, movetoworkspace, 7
bind = $mod shift, 8, movetoworkspace, 8

###########################################################
####                    End                            ####
###########################################################



###########################################################
####                 Window rules                      ####
###########################################################

windowrule = opacity 1.0 override 1.0 override, match:class chromium
windowrule = opacity 1.0 override 1.0 override, match:class mpv
windowrule = opacity 1.0 override 1.0 override, match:class org.pwmt.zathura

###########################################################
####                    End                            ####
###########################################################
